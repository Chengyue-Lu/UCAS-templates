<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Presentation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="presentation-container">
        <!-- 幻灯片开始 -->
        <section class="slide active">
            <div class="slide-content">
                <h1>你的展示标题</h1>
                <h2 class="subtitle">副标题</h2>
                <p class="author">作者名称 | 日期</p>
            </div>
        </section>

        <section class="slide">
            <div class="slide-content">
                <h2>第一页内容</h2>
                <ul class="content-list">
                    <li>要点一</li>
                    <li>要点二</li>
                    <li>要点三</li>
                </ul>
            </div>
        </section>

        <section class="slide">
            <div class="slide-content">
                <h2>第二页内容</h2>
                <p>这里可以添加更多内容。支持多种HTML元素。</p>
                <img src="" alt="示例图片" class="slide-image">
            </div>
        </section>

        <section class="slide">
            <div class="slide-content">
                <h2>内容页面示例</h2>
                <div class="two-column">
                    <div class="column">
                        <h3>左列</h3>
                        <p>内容在这里</p>
                    </div>
                    <div class="column">
                        <h3>右列</h3>
                        <p>内容在这里</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="slide">
            <div class="slide-content">
                <h2>感谢观看</h2>
                <p class="closing">问答环节</p>
            </div>
        </section>

        <!-- 幻灯片结束 -->
    </div>

    <!-- 控制栏 -->
    <div class="controls">
        <button class="btn prev" title="上一张 (← 或 A)">❮</button>
        <span class="slide-counter"><span class="current">1</span>/<span class="total">5</span></span>
        <button class="btn next" title="下一张 (→ 或 D)">❯</button>
    </div>

    <!-- 演讲者备注（F键打开） -->
    <div class="speaker-notes" id="speakerNotes">
        <div class="notes-content">
            <h3>演讲者备注</h3>
            <p id="notesText">按 F 键关闭备注</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
